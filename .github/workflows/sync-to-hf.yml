name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: pip install huggingface_hub hf_xet
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])

          api.upload_folder(
              folder_path="updated_app",
              repo_id="rlwagner01/scam-pac-explorer",
              repo_type="space",
              ignore_patterns=["assests/"],  # images stored directly on HF
          )
          print("Successfully deployed to https://huggingface.co/spaces/rlwagner01/scam-pac-explorer")
          EOF
