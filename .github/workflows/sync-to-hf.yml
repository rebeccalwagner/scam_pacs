name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd /tmp
          git clone https://github.com/sarahmathey/scam_pacs.git hf_push
          cd hf_push
          git checkout --orphan fresh
          git rm -rf .
          git checkout main -- app.py requirements.txt Dockerfile pages/
          git add .
          git commit -m "sync to hugging face"
          git push -f https://rlwagner01:$HF_TOKEN@huggingface.co/spaces/rlwagner01/scam-pac-explorer fresh:main