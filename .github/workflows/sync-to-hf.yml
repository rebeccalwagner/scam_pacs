name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Xet storage support
        run: |
          pip install hf_xet
          git xet install
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd /tmp
          git clone https://github.com/rebeccalwagner/scam_pacs.git hf_push
          cd hf_push
          git config user.email "rebeccalwagner@users.noreply.github.com"
          git config user.name "rebeccalwagner"
          git checkout --orphan fresh
          git rm -rf .
          git checkout main -- updated_app/
          cp -r updated_app/* .
          rm -rf updated_app/
          git add .
          git commit -m "sync to hugging face"
          git push -f https://rlwagner01:$HF_TOKEN@huggingface.co/spaces/rlwagner01/scam-pac-explorer fresh:main
